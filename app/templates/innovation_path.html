{% extends "base.html" %}

{% block title %}智能学习路径推荐 - 离散数学智能教学体{% endblock %}

{% block extra_css %}
<style>
.path-layout {
    display: flex;
    gap: 20px;
    min-height: calc(100vh - 200px);
}

.path-sidebar {
    width: 320px;
    min-width: 320px;
    background: var(--white);
    border-radius: 12px;
    border: 1px solid var(--border-green);
    padding: 20px;
    max-height: calc(100vh - 200px);
    overflow-y: auto;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}

.path-sidebar h5 {
    color: var(--dark-green);
    font-size: 1.05rem;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border-green);
}

.mastered-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 6px;
    border: 1.5px solid transparent;
}

.mastered-item:hover {
    background: var(--light-green-bg);
    border-color: var(--border-green);
}

.mastered-item.checked {
    background: rgba(46,139,87,0.08);
    border-color: var(--seagreen);
}

.mastered-item input[type="checkbox"] {
    margin-top: 3px;
    accent-color: var(--seagreen);
    width: 18px;
    height: 18px;
    cursor: pointer;
    flex-shrink: 0;
}

.mastered-item .mi-info {
    flex: 1;
    min-width: 0;
}

.mastered-item .mi-label {
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--ink-color);
}

.mastered-item .mi-meta {
    font-size: 0.75rem;
    color: var(--ink-gray);
    margin-top: 2px;
}

.mastered-item .mi-badges {
    display: flex;
    gap: 4px;
    margin-top: 4px;
}

.mi-badge {
    font-size: 0.65rem;
    padding: 1px 6px;
    border-radius: 8px;
    font-weight: 600;
}

.mi-badge.core { background: #FFF3E0; color: #E65100; }
.mi-badge.prereq { background: #E3F2FD; color: #1565C0; }

.path-main {
    flex: 1;
    background: var(--white);
    border-radius: 12px;
    border: 1px solid var(--border-green);
    padding: 24px;
    overflow-y: auto;
    max-height: calc(100vh - 200px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}

.path-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 2px solid var(--border-green);
}

.path-summary {
    display: flex;
    gap: 20px;
}

.path-summary .ps-item {
    text-align: center;
}

.path-summary .ps-num {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--seagreen);
}

.path-summary .ps-label {
    font-size: 0.72rem;
    color: var(--ink-gray);
}

.btn-select-all, .btn-clear-all {
    font-size: 0.8rem;
    padding: 4px 12px;
    border-radius: 6px;
}

/* 时间线 */
.timeline {
    position: relative;
    padding-left: 40px;
}

.timeline::before {
    content: '';
    position: absolute;
    left: 16px;
    top: 0;
    bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--seagreen), var(--border-green));
    border-radius: 2px;
}

.timeline-layer {
    margin-bottom: 24px;
}

.timeline-layer-label {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--seagreen);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    padding-left: 28px;
    position: relative;
}

.timeline-layer-label::before {
    content: '';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--seagreen);
    border: 2px solid #fff;
    box-shadow: 0 0 0 2px var(--seagreen);
}

.timeline-node {
    position: relative;
    margin-bottom: 14px;
    transition: all 0.3s ease;
}

.timeline-node::before {
    content: '';
    position: absolute;
    left: -32px;
    top: 14px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #ddd;
    border: 3px solid #fff;
    box-shadow: 0 0 0 2px #ccc;
    z-index: 1;
    transition: all 0.3s ease;
}

.timeline-node.mastered::before {
    background: var(--medium-seagreen);
    box-shadow: 0 0 0 2px var(--seagreen);
}

.timeline-node.current::before {
    background: var(--seagreen);
    box-shadow: 0 0 0 2px var(--seagreen), 0 0 12px rgba(46,139,87,0.4);
}

.timeline-card {
    background: var(--light-green-bg-2);
    border: 1.5px solid var(--border-green);
    border-radius: 10px;
    padding: 14px 18px;
    transition: all 0.3s ease;
    cursor: pointer;
}

.timeline-card:hover {
    transform: translateX(4px);
    box-shadow: 0 4px 12px rgba(46,139,87,0.12);
    border-color: var(--seagreen);
}

.timeline-node.mastered .timeline-card {
    background: rgba(76,175,80,0.08);
    border-color: var(--medium-seagreen);
}

.timeline-node.core .timeline-card {
    border-left: 4px solid #E65100;
}

.timeline-node.core .timeline-card::after {
    content: '核心';
    position: absolute;
    right: 14px;
    top: 12px;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 8px;
    background: #FFF3E0;
    color: #E65100;
    font-weight: 700;
}

.timeline-node.prereq .timeline-card::before {
    content: '前置';
    position: absolute;
    right: 50px;
    top: 12px;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 8px;
    background: #E3F2FD;
    color: #1565C0;
    font-weight: 700;
}

.timeline-node.core.prereq .timeline-card::before {
    right: 80px;
}

.tc-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
}

.tc-title {
    font-weight: 700;
    font-size: 1rem;
    color: var(--dark-green);
}

.timeline-node.core .tc-title {
    font-size: 1.15rem;
}

.tc-time {
    font-size: 0.8rem;
    color: var(--seagreen);
    font-weight: 600;
    white-space: nowrap;
}

.tc-info {
    font-size: 0.82rem;
    color: var(--ink-gray);
    line-height: 1.5;
}

.tc-prereq {
    margin-top: 6px;
    font-size: 0.75rem;
    color: var(--ink-gray);
}

.tc-prereq span {
    display: inline-block;
    background: var(--light-green-bg);
    padding: 1px 8px;
    border-radius: 6px;
    margin-right: 4px;
    margin-bottom: 2px;
}

.tc-status {
    display: inline-block;
    font-size: 0.7rem;
    padding: 2px 10px;
    border-radius: 10px;
    font-weight: 600;
    margin-top: 6px;
}

.tc-status.mastered { background: #C8E6C9; color: #1B5E20; }
.tc-status.todo { background: #ECEFF1; color: #546E7A; }
.tc-status.ready { background: #FFF3E0; color: #E65100; }

.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-gray);
}

.empty-state i {
    font-size: 3rem;
    color: var(--border-green);
    margin-bottom: 16px;
}
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h2 class="text-dark-green mb-0"><i class="bi bi-signpost-2-fill me-2"></i>智能学习路径推荐</h2>
        <small class="text-ink-gray">基于知识点依赖关系的拓扑排序，推荐最优学习路径</small>
    </div>
    <a href="{{ url_for('innovation.index') }}" class="btn btn-outline-seagreen btn-sm">
        <i class="bi bi-arrow-left me-1"></i>返回创新点
    </a>
</div>

<div class="path-layout">
    <!-- 左侧：知识点选择 -->
    <div class="path-sidebar">
        <h5><i class="bi bi-check2-square me-1"></i>已掌握知识点</h5>
        <p class="text-ink-gray" style="font-size:0.8rem;">勾选你已掌握的知识点，系统将自动计算推荐学习路径</p>
        <div class="d-flex gap-2 mb-3">
            <button class="btn btn-outline-seagreen btn-select-all" id="btnSelectAll">全选</button>
            <button class="btn btn-outline-secondary btn-clear-all" id="btnClearAll">清空</button>
        </div>
        <div id="masteredList"></div>
    </div>

    <!-- 右侧：推荐路径 -->
    <div class="path-main">
        <div class="path-header">
            <h5 class="text-dark-green mb-0"><i class="bi bi-diagram-2 me-1"></i>推荐学习路径</h5>
            <div class="path-summary" id="pathSummary">
                <div class="ps-item">
                    <div class="ps-num" id="psTotal">-</div>
                    <div class="ps-label">总知识点</div>
                </div>
                <div class="ps-item">
                    <div class="ps-num" id="psMastered" style="color:var(--medium-seagreen);">-</div>
                    <div class="ps-label">已掌握</div>
                </div>
                <div class="ps-item">
                    <div class="ps-num" id="psRemaining" style="color:#E65100;">-</div>
                    <div class="ps-label">待学习</div>
                </div>
                <div class="ps-item">
                    <div class="ps-num" id="psHours">-</div>
                    <div class="ps-label">预计学时</div>
                </div>
            </div>
        </div>
        <div id="pathContainer"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    let pathData = null;
    let masteredSet = new Set();

    const GROUP_COLORS = {
        logic: '#2E8B57', set: '#E65100', algorithm: '#1565C0',
        number: '#6A1B9A', counting: '#C62828', relation: '#00838F',
        graph: '#37474F'
    };

    function loadPath() {
        fetch('{{ url_for("innovation.api_recommend_path") }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mastered: Array.from(masteredSet) })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            pathData = data;
            renderMasteredList(data.path);
            renderPath(data);
            renderSummary(data);
        })
        .catch(function(err) { console.error('加载路径失败:', err); });
    }

    function renderMasteredList(path) {
        const container = document.getElementById('masteredList');
        container.innerHTML = '';
        path.forEach(function(node) {
            const div = document.createElement('div');
            div.className = 'mastered-item' + (node.is_mastered ? ' checked' : '');
            const badges = [];
            if (node.is_core) badges.push('<span class="mi-badge core">核心</span>');
            if (node.is_prerequisite) badges.push('<span class="mi-badge prereq">前置</span>');
            div.innerHTML =
                '<input type="checkbox" id="m_' + node.id + '" ' + (node.is_mastered ? 'checked' : '') + '>' +
                '<div class="mi-info">' +
                    '<div class="mi-label">' + node.chapter_name + ' ' + node.label + '</div>' +
                    '<div class="mi-meta">预计 ' + node.estimated_hours + ' 学时</div>' +
                    (badges.length ? '<div class="mi-badges">' + badges.join('') + '</div>' : '') +
                '</div>';
            div.querySelector('input').addEventListener('change', function(e) {
                if (e.target.checked) {
                    masteredSet.add(node.id);
                    div.classList.add('checked');
                } else {
                    masteredSet.delete(node.id);
                    div.classList.remove('checked');
                }
                loadPath();
            });
            container.appendChild(div);
        });
    }

    function renderPath(data) {
        const container = document.getElementById('pathContainer');
        if (!data.path || data.path.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>暂无路径数据</p></div>';
            return;
        }

        // 按层分组
        const layerMap = {};
        data.path.forEach(function(node) {
            if (!layerMap[node.depth]) layerMap[node.depth] = [];
            layerMap[node.depth].push(node);
        });

        let html = '<div class="timeline">';
        const layerNames = {
            0: '入门基础', 1: '核心基础', 2: '进阶学习',
            3: '高级应用', 4: '专题拓展', 5: '综合应用',
            6: '前沿专题'
        };

        Object.keys(layerMap).sort(function(a,b){return a-b;}).forEach(function(depth) {
            const nodes = layerMap[depth];
            const label = layerNames[depth] || ('阶段 ' + (parseInt(depth)+1));
            html += '<div class="timeline-layer">';
            html += '<div class="timeline-layer-label">' + label + '</div>';
            nodes.forEach(function(node) {
                let cls = 'timeline-node';
                if (node.is_mastered) cls += ' mastered';
                if (node.is_core) cls += ' core';
                if (node.is_prerequisite) cls += ' prereq';

                // 判断是否可以学习（前置全部已掌握）
                let canLearn = true;
                if (!node.is_mastered) {
                    node.prerequisites.forEach(function(p) {
                        if (!masteredSet.has(p)) canLearn = false;
                    });
                }

                let statusBadge = '';
                if (node.is_mastered) {
                    statusBadge = '<span class="tc-status mastered"><i class="bi bi-check-circle-fill"></i> 已掌握</span>';
                } else if (canLearn) {
                    statusBadge = '<span class="tc-status ready"><i class="bi bi-lightning-fill"></i> 可学习</span>';
                } else {
                    statusBadge = '<span class="tc-status todo"><i class="bi bi-clock"></i> 待学习</span>';
                }

                let prereqHtml = '';
                if (node.prerequisites.length > 0) {
                    const prereqLabels = node.prerequisites.map(function(pid) {
                        const p = data.path.find(function(x){return x.id===pid;});
                        return p ? '<span>' + p.label + '</span>' : '';
                    });
                    prereqHtml = '<div class="tc-prereq"><i class="bi bi-arrow-return-right"></i> 前置：' + prereqLabels.join('') + '</div>';
                }

                html += '<div class="' + cls + '">';
                html += '<div class="timeline-card" data-id="' + node.id + '">';
                html += '<div class="tc-header">';
                html += '<span class="tc-title">' + node.chapter_name + ' ' + node.label + '</span>';
                html += '<span class="tc-time"><i class="bi bi-clock me-1"></i>' + node.estimated_hours + ' 学时</span>';
                html += '</div>';
                html += '<div class="tc-info">' + node.info + '</div>';
                html += prereqHtml;
                html += statusBadge;
                html += '</div>';
                html += '</div>';
            });
            html += '</div>';
        });
        html += '</div>';
        container.innerHTML = html;

        // 点击卡片
        container.querySelectorAll('.timeline-card').forEach(function(card) {
            card.addEventListener('click', function() {
                const id = parseInt(this.dataset.id);
                const node = data.path.find(function(x){return x.id===id;});
                if (node) {
                    // 切换已掌握状态
                    if (masteredSet.has(id)) {
                        masteredSet.delete(id);
                    } else {
                        masteredSet.add(id);
                    }
                    loadPath();
                }
            });
        });
    }

    function renderSummary(data) {
        document.getElementById('psTotal').textContent = data.total_nodes;
        document.getElementById('psMastered').textContent = data.mastered_count;
        document.getElementById('psRemaining').textContent = data.remaining_count;
        let totalHours = 0;
        data.path.forEach(function(n) {
            if (!n.is_mastered) totalHours += n.estimated_hours;
        });
        document.getElementById('psHours').textContent = totalHours;
    }

    // 全选/清空
    document.getElementById('btnSelectAll').addEventListener('click', function() {
        if (!pathData) return;
        pathData.path.forEach(function(n) { masteredSet.add(n.id); });
        loadPath();
    });
    document.getElementById('btnClearAll').addEventListener('click', function() {
        masteredSet.clear();
        loadPath();
    });

    loadPath();
})();
</script>
{% endblock %}
